<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backyard Birds</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Backyard Birds</h1>
    <p class="subtitle">Last 24 hours</p>
  </header>

  <main id="bird-grid"></main>

  <div id="empty-state" class="empty-state hidden">
    <svg class="empty-icon" viewBox="0 0 64 64" width="128" height="128">
      <!-- Body + head outline: beak tip → over round head → neck → back → pointed tail → belly → breast → throat → beak tip -->
      <path d="M55 22 L45 18 C42 11 35 9 32 13 C29 17 23 18 17 21 C11 23 7 19 5 15 C3 19 3 24 6 28 C9 33 16 38 26 41 C32 43 38 42 43 37 C48 32 50 26 48 24 Z"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <!-- Eye -->
      <circle cx="42" cy="17" r="2.5" fill="currentColor"/>
      <!-- Wing hint -->
      <path d="M20 31 Q28 26 39 29" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="25" y1="41" x2="23" y2="52" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="32" y1="42" x2="30" y2="52" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <!-- Perch -->
      <line x1="8" y1="52" x2="52" y2="52" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <p>No birds detected in the last 24 hours</p>
    <p class="empty-hint">Detections will appear here automatically</p>
  </div>

  <footer>
    <span id="last-updated"></span>
    <span>Rarity data from&nbsp;<a href="https://ebird.org" target="_blank" rel="noopener">eBird</a></span>
    <span>Audio samples from&nbsp;<a href="https://xeno-canto.org" target="_blank" rel="noopener">Xeno-canto</a>&nbsp;community</span>
    <a href="https://github.com/aaronlindsey/bird-thing" target="_blank" rel="noopener" class="github-link" aria-label="View source on GitHub">Code&nbsp;<svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg></a>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
